<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヨルシカ (Yorushika) 歌詞隨機抽選</title>
    <style>
        :root {
            --bg-color: #ffffff; /* 配合 Logo 圖片的白底 */
            --text-color: #2c3e50;
            --accent-color: #8faec4;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;

            /* 大背景：ヨルシカ Logo 圖片 */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/2/27/Yorushika_Logo.jpg'); 
            background-size: contain;     
            background-position: center;  
            background-repeat: no-repeat; 
            background-attachment: fixed; 
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            color: #5a738e;
        }

        /* 歌詞卡片主體 */
        .card {
            position: relative; /* 為了讓內部半透明背景圖能定位 */
            overflow: hidden;   /* 避免內部圖片超出圓角 */
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); 
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            transition: all 0.5s ease;
        }

        /* 專門用來放卡片背景圖的標籤設定 */
        .card-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖片填滿卡片 */
            object-position: center;
            /* 控制半透明度（0.15 代表 15% 透明度，可依喜好自行調整 0.1 ~ 0.3） */
            opacity: 0.15; 
            z-index: 1; /* 讓圖片在卡片底色上方 */
            display: none; /* 一開始沒抽卡前先隱藏 */
            transition: opacity 0.5s ease;
        }

        /* 確保卡片內的文字與內容都在半透明圖片之上 */
        .lyrics, .song-info {
            position: relative;
            z-index: 2; 
        }

        .lyrics {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            white-space: pre-line; /* 保留換行 */
            font-weight: 400;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .song-info {
            font-size: 0.9rem;
            color: #95a5a6;
            letter-spacing: 1px;
        }

        button {
            position: relative;
            z-index: 2;
            background-color: #ffffff; 
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        button:hover {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 5px 15px rgba(143, 174, 196, 0.4);
        }

        /* 動態效果 */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ヨルシカ Lyrics Generator</h1>
        
        <div id="lyrics-card" class="card">
            <img id="card-bg" class="card-bg-img" src="" alt="bg" referrerpolicy="no-referrer">
            
            <div id="lyrics-display" class="lyrics">點擊下方按鈕，抽取一句觸動心弦的歌詞。</div>
            <div id="song-display" class="song-info"></div>
        </div>

        <button onclick="getRandomLyrics()">隨機抽選</button>
    </div>

    <script>
        // 歌詞資料庫（完全保留你貼上的精美圖片網址）
        const yorushikaLyrics = [
            {
                lyrics: "如果沒有做音樂的話就好了",
                song: "《だから僕は音楽を辞めた》（所以我放棄了音樂）",
                bg: "https://truth.bahamut.com.tw/s01/202201/0cea7cbaa3d1d9c8f4e6525036ead6b7.JPG"
            },
            {
                lyrics: "全部都是你的錯",
                song: "《だから僕は音楽を辞めた》（所以我放棄了音樂）",
                bg: "https://truth.bahamut.com.tw/s01/202201/0cea7cbaa3d1d9c8f4e6525036ead6b7.JPG"
            },
            {
                lyrics: "音樂並沒有什麼賺頭",
                song: "《だから僕は音楽を辞めた》（所以我放棄了音樂）",
                bg: "https://truth.bahamut.com.tw/s01/202201/0cea7cbaa3d1d9c8f4e6525036ead6b7.JPG"
            },
            {
                lyrics: "所以我放棄了音樂",
                song: "《だから僕は音楽を辞めた》（所以我放棄了音樂）",
                bg: "https://truth.bahamut.com.tw/s01/202201/0cea7cbaa3d1d9c8f4e6525036ead6b7.JPG"
            },
            {
                lyrics: "もっと、もっと、もっと 更多更多更多",
                song: "《言って》（說吧）",
                bg: "https://i.ytimg.com/vi/F64yFFnZfkI/maxresdefault.jpg"
            },
            {
                lyrics: "言って",
                song: "《言って》（說吧）",
                bg: "https://i.ytimg.com/vi/F64yFFnZfkI/maxresdefault.jpg"
            },
            {
                lyrics: "風が私を呼んでいる 風在呼喚我",
                song: "《千鳥》",
                bg: "https://i.ytimg.com/vi/t75qlQPXJGw/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDIGC8IYHwvrGCOtL-T5BHG2L7VUA"
            },
                        {
                lyrics: "先生、人生相談です",
                song: "《ヒッチコック》（希區考克）",
                bg: "https://i.ytimg.com/vi/t7MBzMP4OzY/maxresdefault.jpg"
            },
                                    {
                lyrics: "幸せの文字が￥を含むのは何でなんでしょうか　為什麼幸福的幸裡寫著￥",
                song: "《ヒッチコック》（希區考克）",
                bg: "https://i.ytimg.com/vi/t7MBzMP4OzY/maxresdefault.jpg"
            },
                                                {
                lyrics: "この先どうなら楽ですか　未來要怎樣才能活得輕鬆呢",
                song: "《ヒッチコック》（希區考克）",
                bg: "https://i.ytimg.com/vi/t7MBzMP4OzY/maxresdefault.jpg"
            },
                        {
                lyrics: "どっどど　どどうど",
                song: "又三郎",
                bg: "https://i.ytimg.com/vi/siNFnlqtd8M/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBQZ2f0rayft2I3M7gdGlfWXwWb2w"
            },
            {
                lyrics: "三時半 腕を振って 三點半 揮舞著手臂",
                song: "《千鳥》",
                bg: "https://i.ytimg.com/vi/t75qlQPXJGw/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDIGC8IYHwvrGCOtL-T5BHG2L7VUA"
            }
        ];

        let lastIndex = -1;

        function getRandomLyrics() {
            const bgImage = document.getElementById('card-bg');
            const lyricsText = document.getElementById('lyrics-display');
            const songText = document.getElementById('song-display');
            
            // 先做淡出動畫
            lyricsText.classList.add('fade-out');
            songText.classList.add('fade-out');

            setTimeout(() => {
                let randomIndex;
                
                // 確保不會連續抽到同一首
                do {
                    randomIndex = Math.floor(Math.random() * yorushikaLyrics.length);
                } while (randomIndex === lastIndex && yorushikaLyrics.length > 1);

                lastIndex = randomIndex;
                const selection = yorushikaLyrics[randomIndex];

                // 換上新內容
                lyricsText.innerText = selection.lyrics;
                songText.innerText = selection.song;

                // 換上對應的背景圖片並顯示出來
                if (selection.bg) {
                    bgImage.src = selection.bg;
                    bgImage.style.display = 'block';
                } else {
                    bgImage.style.display = 'none';
                }

                // 淡入回來
                lyricsText.classList.remove('fade-out');
                songText.classList.remove('fade-out');
            }, 300); // 動畫延遲
        }
    </script>
</body>
</html>
